name: Build & push Docker image to GHCR

# Builds the production Docker image on GitHub-hosted runners (7 GB RAM,
# free for public repos) and pushes it to GitHub Container Registry.
# Railway then pulls the prebuilt image — no Railway-side build needed,
# which sidesteps the trial worker's memory limit.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-runs from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Schema-drift gate: fails the build if a migration column is missing
      # from init.sql or from database.ts runMigrations(). Prevents the
      # "no such column" class of bug from ever shipping again.
      - name: Schema consistency check
        run: python3 scripts/check-schema.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Force lowercase: ghcr.io requires lowercase repo names.
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/redmushroom
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache layer — speeds up subsequent builds 5-10x
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # linux/amd64 only (matches Railway runtime). Add arm64 if you
          # ever switch to ARM-based hosting.
          platforms: linux/amd64
